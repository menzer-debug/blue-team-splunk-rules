title: SQL Injection Attempt Detection
id: web-001
status: experimental
description: Detects common SQL injection patterns in web requests
logsource:
  product: webserver
detection:
  selection:
    uri|contains:
      - "UNION SELECT"
      - "' OR 1=1"
      - "DROP TABLE"
      - "'--"
  condition: selection
level: high

splunk:
  search: 'index=web_logs earliest=-5m ("UNION SELECT" OR "'\'' OR 1=1" OR "DROP TABLE" OR "'\''--")'
  cron_schedule: "*/5 * * * *"
  is_scheduled: true
  disabled: false
